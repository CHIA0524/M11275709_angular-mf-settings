name: Deploy Settings to GitHub Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - src/**
      - public/**
      - angular.json
      - federation.config.js
      - package.json
      - package-lock.json
      - tsconfig.app.json
      - tsconfig.federation.json
      - tsconfig.json
      - tsconfig.spec.json
      - .github/workflows/deploy-github-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NG_PERSISTENT_BUILD_CACHE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Restore Angular cache
        uses: actions/cache@v5
        with:
          path: .angular/cache
          key: ${{ runner.os }}-angular-settings-${{ hashFiles('package-lock.json', 'angular.json', 'federation.config.js', 'tsconfig*.json') }}
          restore-keys: |
            ${{ runner.os }}-angular-settings-

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm ci

      - name: Restore Native Federation cache
        uses: actions/cache@v5
        with:
          path: node_modules/.cache/native-federation
          key: ${{ runner.os }}-native-federation-settings-${{ hashFiles('package-lock.json', 'angular.json', 'federation.config.js', 'tsconfig*.json') }}
          restore-keys: |
            ${{ runner.os }}-native-federation-settings-

      - name: Build Angular app
        run: npm run build -- --configuration production --base-href "/M11275709_angular-mf-settings/"

      - name: Prepare Pages artifact
        shell: bash
        run: |
          cp dist/settings/browser/index.html dist/settings/browser/404.html
          touch dist/settings/browser/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/settings/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
